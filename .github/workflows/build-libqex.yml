name: Build libQEx

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: qex_extract-linux-x64
            binary_name: qex_extract
          - os: windows-latest
            artifact_name: qex_extract-windows-x64
            binary_name: qex_extract.exe
          - os: macos-15  # Intel
            artifact_name: qex_extract-macos-x64
            binary_name: qex_extract
          - os: macos-14  # ARM (M1/M2)
            artifact_name: qex_extract-macos-arm64
            binary_name: qex_extract

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Clone OpenMesh
        run: |
          git clone --depth 1 --branch OpenMesh-9.0 --recurse-submodules https://gitlab.vci.rwth-aachen.de:9000/OpenMesh/OpenMesh.git
          echo "OpenMesh version: OpenMesh-9.0 ($(git -C OpenMesh rev-parse HEAD))" >> $GITHUB_STEP_SUMMARY

      - name: Build OpenMesh (Unix)
        if: runner.os != 'Windows'
        run: |
          cd OpenMesh
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_APPS=OFF -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/openmesh-install -DCMAKE_CXX_STANDARD=11 -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build . --config Release -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
          cmake --install . --config Release

      - name: Build OpenMesh (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          cd OpenMesh
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_APPS=OFF -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}\openmesh-install
          cmake --build . --config Release
          cmake --install . --config Release

      - name: Clone libQEx
        run: |
          git clone --depth 1 https://github.com/hcebke/libQEx.git
          echo "libQEx commit: $(git -C libQEx rev-parse HEAD)" >> $GITHUB_STEP_SUMMARY

      - name: Build libQEx (Unix)
        if: runner.os != 'Windows'
        run: |
          cd libQEx
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=${{ github.workspace }}/openmesh-install -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DCMAKE_CXX_FLAGS="-std=c++11"
          cmake --build . --config Release -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Build libQEx (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          cd libQEx
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=${{ github.workspace }}\openmesh-install -DCMAKE_POLICY_VERSION_MINIMUM=3.5 -DCMAKE_CXX_FLAGS="/D_USE_MATH_DEFINES"
          cmake --build . --config Release

      - name: Find and copy binary (Unix)
        if: runner.os != 'Windows'
        run: |
          # List all executables to debug
          find libQEx/build -type f -executable -name "*" | head -20
          # Try qex_extract first, fall back to cmdline_tool
          binary=$(find libQEx/build -name "qex_extract" -type f -executable | head -1)
          if [ -z "$binary" ]; then
            binary=$(find libQEx/build -name "cmdline_tool" -type f -executable | head -1)
          fi
          if [ -z "$binary" ]; then
            echo "No qex binary found!"
            exit 1
          fi
          cp "$binary" ./qex_extract
          chmod +x ./qex_extract
          ls -la ./qex_extract

      - name: Find and copy binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # List all exe files to debug
          Get-ChildItem -Path libQEx/build -Recurse -Filter "*.exe" | ForEach-Object { Write-Host "Found: $($_.FullName)" }
          # Try qex_extract first, fall back to cmdline_tool
          $binary = Get-ChildItem -Path libQEx/build -Recurse -Filter "qex_extract.exe" | Select-Object -First 1
          if (-not $binary) {
            $binary = Get-ChildItem -Path libQEx/build -Recurse -Filter "cmdline_tool.exe" | Select-Object -First 1
          }
          if (-not $binary) {
            throw "No qex binary found!"
          }
          Copy-Item $binary.FullName -Destination ./qex_extract.exe
          Get-Item ./qex_extract.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ./${{ matrix.binary_name }}
          if-no-files-found: error

  # Create a release with all binaries when triggered by a tag
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries

      - name: Display structure
        run: ls -R binaries

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: binaries/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
